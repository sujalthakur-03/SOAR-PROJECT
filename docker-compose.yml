# ══════════════════════════════════════════════════════════════════════════════
# CyberSentinel SOAR v3.0 — Docker Compose
# ══════════════════════════════════════════════════════════════════════════════
#
# Services:
#   soar-database   — MongoDB 7.0 (persistent volume)
#   soar-backend    — Node.js Express API + Execution Engine
#   soar-frontend   — React + Vite production build
#
# Port Configuration:
#   Set FRONTEND_PORT and BACKEND_PORT env vars before running, or use defaults.
#   Example: FRONTEND_PORT=3002 BACKEND_PORT=3012 docker-compose up -d
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
#
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────────────────
  # MongoDB — soar-database
  # ─────────────────────────────────────────────────────────────────────────
  soar-database:
    image: ghcr.io/cybersentinel-06/cybersentinel-soar-database:latest
    container_name: soar-database
    environment:
      MONGO_INITDB_DATABASE: cybersentinel
    volumes:
      - soar-db-data:/data/db
      - soar-db-config:/data/configdb
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - soar-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    # Resource limits
    cpus: 2
    mem_limit: 4g
    mem_reservation: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────────────────────
  # Backend API + Execution Engine — soar-backend
  # ─────────────────────────────────────────────────────────────────────────
  soar-backend:
    image: ghcr.io/cybersentinel-06/cybersentinel-soar-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soar-backend
    env_file:
      - ./backend/.env
    environment:
      # Override MongoDB to point to the Docker service name
      MONGODB_URI: mongodb://soar-database:27017
      MONGODB_DB_NAME: cybersentinel
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "${BACKEND_PORT:-3024}:3001"
    volumes:
      - soar-backend-logs:/app/logs
    networks:
      - soar-network
    depends_on:
      soar-database:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits
    cpus: 1
    mem_limit: 1g
    mem_reservation: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — soar-frontend
  # ─────────────────────────────────────────────────────────────────────────
  soar-frontend:
    image: ghcr.io/cybersentinel-06/cybersentinel-soar-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_PORT: "${BACKEND_PORT:-3024}"
    container_name: soar-frontend
    ports:
      - "${FRONTEND_PORT:-3022}:3000"
    networks:
      - soar-network
    depends_on:
      soar-backend:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits
    cpus: 0.5
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ═══════════════════════════════════════════════════════════════════════════════
# Networks & Volumes
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  soar-network:
    driver: bridge

volumes:
  soar-db-data:
    driver: local
  soar-db-config:
    driver: local
  soar-backend-logs:
    driver: local
